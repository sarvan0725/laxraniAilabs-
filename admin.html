<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Panel | LaxRani AI Labs</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config={darkMode:"class",theme:{extend:{colors:{"on-surface":"#e5e2e1","surface":"#131313","surface-container":"#201f1f","surface-container-high":"#2a2a2a","surface-container-highest":"#353534","surface-container-low":"#1c1b1b","surface-container-lowest":"#0e0e0e","surface-variant":"#353534","on-surface-variant":"#cbc3d7","primary":"#d0bcff","primary-container":"#a078ff","on-primary":"#3c0091","on-primary-container":"#340080","secondary":"#4cd7f6","outline":"#958ea0","outline-variant":"#494454","error":"#ffb4ab"},fontFamily:{headline:["Manrope"],body:["Inter"],label:["Inter"]}}}}
</script>
<style>
body{font-family:'Inter',sans-serif;background:#131313;color:#e5e2e1;}
.font-headline{font-family:'Manrope',sans-serif;}
.text-gradient{background:linear-gradient(135deg,#d0bcff 0%,#a078ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
input,textarea,select{background:#1c1b1b;color:#e5e2e1;border:1px solid #494454;border-radius:0.75rem;padding:0.6rem 1rem;width:100%;outline:none;font-size:0.875rem;}
input:focus,textarea:focus,select:focus{border-color:#d0bcff;}
</style>
</head>
<body class="min-h-screen">

<!-- Login Screen -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm p-8 rounded-3xl bg-surface-container border border-outline-variant/20">
    <h1 class="font-headline text-2xl font-extrabold mb-2 text-center">Admin Login</h1>
    <p class="text-on-surface-variant text-sm text-center mb-8">LaxRani AI Labs</p>
    <input id="pwInput" type="password" placeholder="Enter password" class="mb-4"/>
    <button onclick="doLogin()" class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container py-3 rounded-xl font-bold font-headline mt-2">Login</button>
    <p id="loginErr" class="text-error text-xs text-center mt-3 hidden">Wrong password.</p>
  </div>
</div>

<!-- Admin Panel -->
<div id="adminPanel" class="hidden min-h-screen">
  <!-- Sidebar -->
  <div class="flex min-h-screen">
    <aside class="w-64 bg-surface-container-lowest border-r border-outline-variant/15 flex flex-col p-6 fixed h-full">
      <div class="font-headline font-extrabold text-lg mb-10 text-gradient">LaxRani Admin</div>
      <nav class="flex flex-col gap-2 flex-1">
        <button onclick="showTab('projects')" class="tab-btn flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-left hover:bg-surface-container transition-all" data-tab="projects">
          <span class="material-symbols-outlined text-primary text-xl">work</span> Projects
        </button>
        <button onclick="showTab('reviews')" class="tab-btn flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-left hover:bg-surface-container transition-all" data-tab="reviews">
          <span class="material-symbols-outlined text-secondary text-xl">star</span> Reviews
        </button>
        <button onclick="showTab('clients')" class="tab-btn flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-left hover:bg-surface-container transition-all" data-tab="clients">
          <span class="material-symbols-outlined text-xl" style="color:#fbabff">group</span> Clients
        </button>
      </nav>
      <button onclick="logout()" class="flex items-center gap-2 text-on-surface-variant hover:text-error text-sm mt-4">
        <span class="material-symbols-outlined text-lg">logout</span> Logout
      </button>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 flex-1 p-10">

      <!-- Projects Tab -->
      <div id="tab-projects" class="tab-content">
        <div class="flex justify-between items-center mb-8">
          <h2 class="font-headline text-2xl font-extrabold">Projects</h2>
          <button onclick="openProjectForm()" class="bg-gradient-to-br from-primary to-primary-container text-on-primary-container px-5 py-2.5 rounded-xl font-bold text-sm">+ Add Project</button>
        </div>
        <div id="projectsList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
      </div>

      <!-- Reviews Tab -->
      <div id="tab-reviews" class="tab-content hidden">
        <div class="flex justify-between items-center mb-8">
          <h2 class="font-headline text-2xl font-extrabold">Reviews</h2>
        </div>
        <div id="reviewsList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
      </div>

      <!-- Clients Tab -->
      <div id="tab-clients" class="tab-content hidden">
        <div class="flex justify-between items-center mb-8">
          <h2 class="font-headline text-2xl font-extrabold">Clients</h2>
          <button onclick="openClientForm()" class="bg-gradient-to-br from-primary to-primary-container text-on-primary-container px-5 py-2.5 rounded-xl font-bold text-sm">+ Add Client</button>
        </div>
        <div id="clientsList" class="flex flex-col gap-4"></div>
      </div>

    </main>
  </div>
</div>

<!-- Client Form Modal -->
<div id="clientFormModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm p-4">
  <div class="bg-surface-container rounded-3xl max-w-lg w-full p-8 border border-outline-variant/20 relative max-h-[90vh] overflow-y-auto">
    <button onclick="closeClientForm()" class="absolute top-4 right-4 text-on-surface-variant hover:text-primary"><span class="material-symbols-outlined">close</span></button>
    <h3 id="clientFormTitle" class="font-headline text-xl font-bold mb-6">Add Client</h3>
    <input id="cId" type="hidden"/>
    <div class="flex flex-col gap-3">
      <input id="cName" placeholder="Client Name"/>
      <input id="cEmail" placeholder="Client Email"/>
      <input id="cCompany" placeholder="Company (optional)"/>
      <input id="cProject" placeholder="Project Name"/>
      <textarea id="cDesc" rows="3" placeholder="Project Description"></textarea>
      <select id="cStatus">
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="review">Under Review</option>
        <option value="completed">Completed</option>
      </select>
      <div>
        <label class="text-xs text-on-surface-variant mb-1 block">Progress (0-100%)</label>
        <input id="cProgress" type="number" min="0" max="100" placeholder="e.g. 60"/>
      </div>
      <textarea id="cUpdates" rows="3" placeholder="Latest update / message for client"></textarea>
      <button onclick="saveClient()" class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container py-3 rounded-xl font-bold font-headline mt-2">Save Client</button>
    </div>
  </div>
</div>

<!-- Project Form Modal -->
<div id="projectFormModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm p-4">
  <div class="bg-surface-container rounded-3xl max-w-lg w-full p-8 border border-outline-variant/20 relative">
    <button onclick="closeProjectForm()" class="absolute top-4 right-4 text-on-surface-variant hover:text-primary"><span class="material-symbols-outlined">close</span></button>
    <h3 id="formTitle" class="font-headline text-xl font-bold mb-6">Add Project</h3>
    <input id="pId" type="hidden"/>
    <div class="flex flex-col gap-3">
      <input id="pTitle" placeholder="Project Title"/>
      <select id="pCategory">
        <option value="web">Web</option>
        <option value="mobile">Mobile</option>
        <option value="ai">AI</option>
      </select>
      <input id="pTags" placeholder="Tags (comma separated, e.g. React, SaaS)"/>
      <input id="pImg" placeholder="Image URL"/>
      <input id="pLink" placeholder="Live Demo URL (optional)"/>
      <input id="pGithub" placeholder="GitHub Repo URL (optional)"/>
      <textarea id="pDesc" rows="3" placeholder="Project description"></textarea>
      <button onclick="saveProject()" class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container py-3 rounded-xl font-bold font-headline mt-2">Save Project</button>
    </div>
  </div>
</div>

<script>
const ADMIN_PASS = 'admin123';
const DEFAULT_PROJECTS=[
  {id:1,title:'Aether AI SaaS',category:'ai',tags:['Web App','AI Platform'],desc:'A next-gen AI SaaS platform with LLM-powered workflows and real-time analytics.',img:'https://lh3.googleusercontent.com/aida-public/AB6AXuCehaBZ71ex6xIDQlbleOZdedWZmlrRWlKSTKuaUroBz34lrtc-Uozat3cTSmXBqFhK9Fqw23epBcZz7dqVVkn0GvX6nxVuM2c54GCqBoGym-SYP9hGxYqGEZvVwIIGXEpEOKGLzd_FIWz7qp2kOkWQvsFjvXk7zOd-cgerkXSUrBcXcmi1mBgcMim_D1g72n1UMhhcE__Q3TMpycGGbekHju0JrEzkMcCghudtKWUpUEc2xgQhhwIBqUg5n6DkxI_2PHfbX_lq-d4',link:'#'},
  {id:2,title:'Lumina Fintech',category:'mobile',tags:['Mobile App','Banking'],desc:'A sleek fintech mobile app with biometric auth, real-time transactions and smart budgeting.',img:'https://lh3.googleusercontent.com/aida-public/AB6AXuClnaHYatSr-fIkERhrehvwDP_PA0VMIynKtoT9GDnl5FQzT-vfTRYTmdlaurgrNowDKEUMhKePE1OrwjtHEZtHH0GuYly-rE5PsN8d-FPX4fI0fmhhWLBpYUka8IgKtbaEcLbc5PpWfAHyOD7w8DxexoAhapau3kCBdO6IG6UHqrw-ly3WNjsoMMjgcnN65D4151B8k0u7q6a_XsvaSIdtDkcnRzjIY2Q5CpHgTj-6QUUjYfMsJeO182evni24YwTVYK0SLl5gpcg',link:'#'},
  {id:3,title:'NexaStore',category:'web',tags:['Web','E-Commerce'],desc:'High-performance e-commerce storefront with headless CMS and blazing-fast checkout.',img:'https://lh3.googleusercontent.com/aida-public/AB6AXuCIo-HXEJ6ak95wBCgKir3shDSouLKQz5sdHLIq1Yf-hKnM1-XKnfURtucuixp9JbM-YJX2NstHwqP4ijZ6BcihqOGjupvFfZAA3bQLULlDjQRVkDk0cbY-vh47VvHjZLUIuDL33ft4aWhJ8Mj_PW0WFREXfzv8nUkjRroKHHtJ7AImd95CPVU710oRyyQHi3rWTjvjbbm3nFjQ-7tsi93pPIvgOYurArV2IU5VSZ2EYE94bfAOv0_RhtEHEzVaiY_4rTR5D-gkW_Y',link:'#'}
];
const DEFAULT_REVIEWS=[
  {id:1,name:'Marcus Chen',role:'CEO, Orbit Labs',text:'Sarthak delivered a product that exceeded our technical expectations.',rating:5},
  {id:2,name:'Elena Rodriguez',role:'Founder, Bloom AI',text:'Working with LaxRani AI Labs was a game changer.',rating:5},
  {id:3,name:'James Wilson',role:'CTO, DataPeak',text:'The design aesthetic is high-end, and the performance is flawless.',rating:5}
];

function getClients(){return JSON.parse(localStorage.getItem('lax_clients')||'[]');}
function saveClients(d){localStorage.setItem('lax_clients',JSON.stringify(d));}

function getProjects(){return JSON.parse(localStorage.getItem('lax_projects')||JSON.stringify(DEFAULT_PROJECTS));}
function saveProjects(d){localStorage.setItem('lax_projects',JSON.stringify(d));}
function getReviews(){return JSON.parse(localStorage.getItem('lax_reviews')||JSON.stringify(DEFAULT_REVIEWS));}
function saveReviews(d){localStorage.setItem('lax_reviews',JSON.stringify(d));}

// Auth
function doLogin(){
  if(document.getElementById('pwInput').value===ADMIN_PASS){
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    showTab('projects');
  } else {
    document.getElementById('loginErr').classList.remove('hidden');
  }
}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function logout(){
  document.getElementById('adminPanel').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('pwInput').value='';
}

// Tabs
function showTab(name){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.add('hidden'));
  document.getElementById('tab-'+name).classList.remove('hidden');
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('bg-surface-container',b.dataset.tab===name);
    b.classList.toggle('text-primary',b.dataset.tab===name);
  });
  if(name==='projects')renderAdminProjects();
  if(name==='reviews')renderAdminReviews();
  if(name==='clients')renderAdminClients();
}

// Projects CRUD
function renderAdminProjects(){
  const list=document.getElementById('projectsList');
  list.innerHTML=getProjects().map(p=>`
    <div class="rounded-2xl bg-surface-container-high border border-outline-variant/15 overflow-hidden">
      <img src="${p.img}" class="w-full h-36 object-cover"/>
      <div class="p-4">
        <span class="text-[10px] uppercase font-bold tracking-widest text-primary">${p.category}</span>
        <h4 class="font-headline font-bold mt-1 mb-1">${p.title}</h4>
        <p class="text-on-surface-variant text-xs mb-4 line-clamp-2">${p.desc}</p>
        <div class="flex gap-2">
          <button onclick="openProjectForm(${p.id})" class="flex-1 py-2 rounded-xl bg-primary/10 text-primary text-xs font-bold hover:bg-primary/20 transition-all">Edit</button>
          <button onclick="deleteProject(${p.id})" class="flex-1 py-2 rounded-xl bg-error/10 text-error text-xs font-bold hover:bg-error/20 transition-all">Delete</button>
        </div>
      </div>
    </div>`).join('');
}
function openProjectForm(id){
  document.getElementById('pId').value='';
  document.getElementById('pTitle').value='';
  document.getElementById('pCategory').value='web';
  document.getElementById('pTags').value='';
  document.getElementById('pImg').value='';
  document.getElementById('pLink').value='';
  document.getElementById('pGithub').value='';
  document.getElementById('pDesc').value='';
  document.getElementById('formTitle').textContent='Add Project';
  if(id){
    const p=getProjects().find(x=>x.id===id);
    if(p){
      document.getElementById('pId').value=p.id;
      document.getElementById('pTitle').value=p.title;
      document.getElementById('pCategory').value=p.category;
      document.getElementById('pTags').value=p.tags.join(', ');
      document.getElementById('pImg').value=p.img;
      document.getElementById('pLink').value=p.link||'';
      document.getElementById('pGithub').value=p.github||'';
      document.getElementById('pDesc').value=p.desc;
      document.getElementById('formTitle').textContent='Edit Project';
    }
  }
  const m=document.getElementById('projectFormModal');
  m.classList.remove('hidden');m.classList.add('flex');
}
function closeProjectForm(){
  const m=document.getElementById('projectFormModal');
  m.classList.add('hidden');m.classList.remove('flex');
}
function saveProject(){
  const title=document.getElementById('pTitle').value.trim();
  const desc=document.getElementById('pDesc').value.trim();
  if(!title){alert('Title is required.');return;}
  const projects=getProjects();
  const existingId=document.getElementById('pId').value;
  const obj={
    id:existingId?+existingId:Date.now(),
    title,
    category:document.getElementById('pCategory').value,
    tags:document.getElementById('pTags').value.split(',').map(t=>t.trim()).filter(Boolean),
    img:document.getElementById('pImg').value.trim(),
    link:document.getElementById('pLink').value.trim()||'#',
    github:document.getElementById('pGithub').value.trim()||'',
    desc
  };
  if(existingId){
    const idx=projects.findIndex(p=>p.id===+existingId);
    projects[idx]=obj;
  } else {
    projects.push(obj);
  }
  saveProjects(projects);
  closeProjectForm();
  renderAdminProjects();
}
function deleteProject(id){
  if(!confirm('Delete this project?'))return;
  saveProjects(getProjects().filter(p=>p.id!==id));
  renderAdminProjects();
}

// Reviews
function starsHTML(n){return '★'.repeat(n)+'☆'.repeat(5-n);}
function renderAdminReviews(){
  const list=document.getElementById('reviewsList');
  list.innerHTML=getReviews().map(r=>`
    <div class="p-6 rounded-2xl bg-surface-container-high border border-outline-variant/15">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold">${r.name[0]}</div>
        <div><p class="font-bold text-sm">${r.name}</p><p class="text-xs text-on-surface-variant">${r.role}</p></div>
      </div>
      <div class="text-yellow-400 text-base mb-2">${starsHTML(r.rating)}</div>
      <p class="text-on-surface-variant text-xs italic mb-4">"${r.text}"</p>
      <button onclick="deleteReview(${r.id})" class="w-full py-2 rounded-xl bg-error/10 text-error text-xs font-bold hover:bg-error/20 transition-all">Delete</button>
    </div>`).join('');
}
function deleteReview(id){
  if(!confirm('Delete this review?'))return;
  saveReviews(getReviews().filter(r=>r.id!==id));
  renderAdminReviews();
}

document.getElementById('projectFormModal').addEventListener('click',function(e){if(e.target===this)closeProjectForm();});
document.getElementById('clientFormModal').addEventListener('click',function(e){if(e.target===this)closeClientForm();});

// Clients CRUD
const STATUS_COLORS={pending:'text-yellow-400',['in-progress']:'text-blue-400',review:'text-purple-400',completed:'text-green-400'};
const STATUS_LABELS={pending:'Pending',['in-progress']:'In Progress',review:'Under Review',completed:'Completed'};

function generateUID(){
  return 'LX-'+Math.random().toString(36).substr(2,4).toUpperCase()+'-'+Date.now().toString(36).toUpperCase().substr(-4);
}
function renderAdminClients(){
  const clients=getClients();
  const list=document.getElementById('clientsList');
  if(!clients.length){list.innerHTML='<p class="text-on-surface-variant text-sm">No clients yet. Add your first client.</p>';return;}
  list.innerHTML=clients.map(c=>`
    <div class="p-6 rounded-2xl bg-surface-container-high border border-outline-variant/15">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div class="flex-1">
          <div class="flex items-center gap-3 mb-1">
            <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold text-lg">${c.name[0]}</div>
            <div>
              <p class="font-bold">${c.name} ${c.company?'<span class="text-on-surface-variant font-normal text-xs">· '+c.company+'</span>':''}</p>
              <p class="text-xs text-on-surface-variant">${c.email||''}</p>
            </div>
          </div>
          <p class="text-sm font-bold mt-2">${c.project}</p>
          <p class="text-xs text-on-surface-variant mt-1 mb-2">${c.desc||''}</p>
          <div class="w-full bg-surface-container-highest rounded-full h-2 mb-1">
            <div class="h-2 rounded-full bg-gradient-to-r from-primary to-primary-container transition-all" style="width:${c.progress||0}%"></div>
          </div>
          <p class="text-xs text-on-surface-variant">${c.progress||0}% complete</p>
          ${c.updates?'<p class="text-xs text-secondary mt-2 italic">📢 '+c.updates+'</p>':''}
        </div>
        <div class="flex flex-col items-end gap-3 min-w-[160px]">
          <span class="font-bold text-xs px-3 py-1 rounded-full bg-surface-container ${STATUS_COLORS[c.status]||'text-on-surface'}">${STATUS_LABELS[c.status]||c.status}</span>
          <div class="flex items-center gap-2 bg-surface-container px-3 py-2 rounded-xl">
            <span class="text-xs text-on-surface-variant">UID:</span>
            <span class="font-mono font-bold text-primary text-sm">${c.uid}</span>
            <button onclick="navigator.clipboard.writeText('${c.uid}')" class="text-on-surface-variant hover:text-primary ml-1" title="Copy UID"><span class="material-symbols-outlined text-base">content_copy</span></button>
          </div>
          <div class="flex gap-2">
            <button onclick="openClientForm('${c.uid}')" class="px-4 py-2 rounded-xl bg-primary/10 text-primary text-xs font-bold hover:bg-primary/20 transition-all">Edit</button>
            <button onclick="deleteClient('${c.uid}')" class="px-4 py-2 rounded-xl bg-error/10 text-error text-xs font-bold hover:bg-error/20 transition-all">Delete</button>
          </div>
        </div>
      </div>
    </div>`).join('');
}
function openClientForm(uid){
  document.getElementById('cId').value='';
  document.getElementById('cName').value='';
  document.getElementById('cEmail').value='';
  document.getElementById('cCompany').value='';
  document.getElementById('cProject').value='';
  document.getElementById('cDesc').value='';
  document.getElementById('cStatus').value='pending';
  document.getElementById('cProgress').value='';
  document.getElementById('cUpdates').value='';
  document.getElementById('clientFormTitle').textContent='Add Client';
  if(uid){
    const c=getClients().find(x=>x.uid===uid);
    if(c){
      document.getElementById('cId').value=c.uid;
      document.getElementById('cName').value=c.name;
      document.getElementById('cEmail').value=c.email||'';
      document.getElementById('cCompany').value=c.company||'';
      document.getElementById('cProject').value=c.project;
      document.getElementById('cDesc').value=c.desc||'';
      document.getElementById('cStatus').value=c.status||'pending';
      document.getElementById('cProgress').value=c.progress||0;
      document.getElementById('cUpdates').value=c.updates||'';
      document.getElementById('clientFormTitle').textContent='Update Client';
    }
  }
  const m=document.getElementById('clientFormModal');
  m.classList.remove('hidden');m.classList.add('flex');
}
function closeClientForm(){
  const m=document.getElementById('clientFormModal');
  m.classList.add('hidden');m.classList.remove('flex');
}
function saveClient(){
  const name=document.getElementById('cName').value.trim();
  const project=document.getElementById('cProject').value.trim();
  if(!name||!project){alert('Name and Project are required.');return;}
  const clients=getClients();
  const existingUid=document.getElementById('cId').value;
  const obj={
    uid:existingUid||generateUID(),
    name,
    email:document.getElementById('cEmail').value.trim(),
    company:document.getElementById('cCompany').value.trim(),
    project,
    desc:document.getElementById('cDesc').value.trim(),
    status:document.getElementById('cStatus').value,
    progress:parseInt(document.getElementById('cProgress').value)||0,
    updates:document.getElementById('cUpdates').value.trim(),
    createdAt:existingUid?(clients.find(c=>c.uid===existingUid)||{}).createdAt||Date.now():Date.now()
  };
  if(existingUid){
    const idx=clients.findIndex(c=>c.uid===existingUid);
    clients[idx]=obj;
  } else {
    clients.push(obj);
  }
  saveClients(clients);
  closeClientForm();
  renderAdminClients();
}
function deleteClient(uid){
  if(!confirm('Delete this client?'))return;
  saveClients(getClients().filter(c=>c.uid!==uid));
  renderAdminClients();
}
</script>
</body>
</html>
